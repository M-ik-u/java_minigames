services:
  db:
    image: postgres:18
    environment:
      POSTGRES_DB: minigames
      POSTGRES_USER: minigames
      POSTGRES_PASSWORD: minigames
    volumes:
      - db_data:/var/lib/postgresql
      - ./src/main/resources/db/migration:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minigames -d minigames"]
      interval: 5s
      timeout: 5s
      retries: 10
    ports:
      - "5432:5432"

  app:
    build: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      JDBC_URL: jdbc:postgresql://db:5432/minigames
      DB_USER: minigames
      DB_PASSWORD: minigames
    ports:
      - "9999:8080"

volumes:
  db_data:
